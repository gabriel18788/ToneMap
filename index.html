<!DOCTYPE html>
<html>
<head>
  <title>ToneMap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎸 ToneMap</h1>

  <input id="songInput" placeholder="Song or artist...">

  <br><br>

  <select id="pickup">
    <option value="single">Single Coil</option>
    <option value="humbucker">Humbucker</option>
    <option value="p90">P90</option>
  </select>

  <select id="body">
    <option value="solid">Solid Body</option>
    <option value="hollow">Hollow Body</option>
  </select>

  <select id="amp">
    <option value="fender">Fender</option>
    <option value="vox">Vox</option>
    <option value="marshall">Marshall</option>
    <option value="mesa">Mesa Boogie</option>
    <option value="peavey">Peavey</option>
    <option value="orange">Orange</option>
    <option value="roland">Roland JC-120</option>
  </select>

  <br><br>

  <h3>🎧 Effects</h3>

  <label><input type="checkbox" class="fx" value="overdrive"> Overdrive</label>
  <label><input type="checkbox" class="fx" value="distortion"> Distortion</label>
  <label><input type="checkbox" class="fx" value="delay"> Delay</label>
  <label><input type="checkbox" class="fx" value="chorus"> Chorus</label>
  <label><input type="checkbox" class="fx" value="reverb"> Reverb</label>

  <br><br>

  <button onclick="findTone()">Generate Tone</button>

  <div id="result"></div>

</div>

<script src="app.js"></script>
</body>
</html>
